site_name: zarr-matlab
site_description: Read and write Zarr v3 arrays natively in MATLAB
site_url: https://catalystneuro.github.io/zarr-matlab/
repo_url: https://github.com/catalystneuro/zarr-matlab
repo_name: catalystneuro/zarr-matlab

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - User guide:
      - Arrays: user-guide/arrays.md
      - Data types: user-guide/data-types.md
      - Compression and codecs: user-guide/compression.md
      - Sharding: user-guide/sharding.md
      - Stores and storage: user-guide/storage.md
      - Using with Python: user-guide/python-interop.md
  - API reference: api.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

exclude_docs: |
  README.md
