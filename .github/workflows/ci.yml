name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PR branches, but let every main-branch run
  # finish: a cancelled run makes the badge read as failing.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: MATLAB ${{ matrix.release }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            release: latest
          - os: ubuntu-latest
            release: R2022b     # oldest supported release
          - os: windows-latest
            release: latest
          - os: macos-latest
            release: latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/native-libs

      - name: Set up Python with zarr
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/ci.yml
      - run: pip install "zarr>=3" numpy

      # Restores the MATLAB install from the Actions cache on later runs.
      # (A containerized alternative exists — mathworks/matlab Docker images —
      # but requires a MATLAB batch licensing token; setup-matlab licenses
      # public repos automatically.)
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.release }}
          cache: true

      - name: Build MEX codecs
        uses: matlab-actions/run-command@v2
        with:
          command: >-
            cd(getenv('GITHUB_WORKSPACE'));
            setenv('ZARR_MATLAB_LIBS', fullfile(pwd, 'native'));
            addpath(fullfile(pwd, 'tools')); build_mex

      - name: Run test suite
        uses: matlab-actions/run-command@v2
        with:
          command: cd(getenv('GITHUB_WORKSPACE')); run tools/run_tests.m
        env:
          ZARR_MATLAB_PYTHON: python
