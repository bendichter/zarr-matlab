name: Build MEX binaries

# Builds relocatable MEX codecs (zstd, blosc, crc32c) for every platform by
# compiling natively on each runner against statically-linked zstd/c-blosc.
# Note: Intel macOS (mexmaci64) is not built here — GitHub retired Intel
# macOS runners; Intel Mac users build locally with tools/build_mex.m.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  ZSTD_TAG: v1.5.7
  BLOSC_TAG: v1.21.6

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: glnxa64
          - os: windows-latest
            platform: win64
          - os: macos-latest
            platform: maca64
    steps:
      - uses: actions/checkout@v4

      - name: Cache static libraries
        id: libcache
        uses: actions/cache@v4
        with:
          path: native
          key: native-${{ matrix.platform }}-${{ env.ZSTD_TAG }}-${{ env.BLOSC_TAG }}-v1

      - name: Build static zstd and c-blosc
        if: steps.libcache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch "$ZSTD_TAG" https://github.com/facebook/zstd.git
          cmake -S zstd/build/cmake -B zstd-build -DCMAKE_BUILD_TYPE=Release \
            -DZSTD_BUILD_SHARED=OFF -DZSTD_BUILD_PROGRAMS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_INSTALL_PREFIX="$PWD/native"
          cmake --build zstd-build --config Release -j4
          cmake --install zstd-build --config Release
          git clone --depth 1 --branch "$BLOSC_TAG" https://github.com/Blosc/c-blosc.git
          cmake -S c-blosc -B blosc-build -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED=OFF -DBUILD_STATIC=ON -DBUILD_TESTS=OFF \
            -DBUILD_BENCHMARKS=OFF -DBUILD_FUZZERS=OFF -DDEACTIVATE_SNAPPY=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_INSTALL_PREFIX="$PWD/native"
          cmake --build blosc-build --config Release -j4
          cmake --install blosc-build --config Release

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Build MEX
        uses: matlab-actions/run-command@v2
        with:
          command: >-
            cd(getenv('GITHUB_WORKSPACE'));
            setenv('ZARR_MATLAB_LIBS', fullfile(pwd, 'native'));
            addpath(pwd, fullfile(pwd, 'tools'));
            build_mex
      - name: Smoke-test MEX
        uses: matlab-actions/run-command@v2
        with:
          command: >-
            cd(getenv('GITHUB_WORKSPACE')); addpath(pwd);
            a = uint8(repmat('zarr', 1, 500));
            assert(isequal(zarr.internal.zstd_mex('decompress',
              zarr.internal.zstd_mex('compress', a, 19, 1)), a));
            assert(isequal(zarr.internal.blosc_mex('decompress',
              zarr.internal.blosc_mex('compress', a, 'zstd', 5, 2, 2)), a));
            assert(zarr.internal.crc32c_mex(uint8('123456789')) == uint32(hex2dec('E3069283')));
            disp('mex smoke ok')

      - uses: actions/upload-artifact@v4
        with:
          name: mex-${{ matrix.platform }}
          path: +zarr/+internal/*.mex*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package per-platform archives
        run: |
          cd artifacts
          for d in mex-*; do (cd "$d" && zip -r "../zarr-matlab-$d.zip" .); done
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/zarr-matlab-mex-*.zip
