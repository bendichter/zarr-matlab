name: Build MEX binaries

# Builds relocatable MEX codecs (zstd, blosc, crc32c) for every platform by
# compiling natively on each runner against statically-linked zstd/c-blosc.
# Note: Intel macOS (mexmaci64) is not built here — GitHub retired Intel
# macOS runners; Intel Mac users build locally with tools/build_mex.m.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: glnxa64
          - os: windows-latest
            platform: win64
          - os: macos-latest
            platform: maca64
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/native-libs

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Build MEX
        uses: matlab-actions/run-command@v2
        with:
          command: >-
            cd(getenv('GITHUB_WORKSPACE'));
            setenv('ZARR_MATLAB_LIBS', fullfile(pwd, 'native'));
            addpath(pwd, fullfile(pwd, 'tools'));
            build_mex
      - name: Smoke-test MEX
        uses: matlab-actions/run-command@v2
        with:
          command: cd(getenv('GITHUB_WORKSPACE')); addpath(pwd, fullfile(pwd, 'tools')); mex_smoke

      - uses: actions/upload-artifact@v4
        with:
          name: mex-${{ matrix.platform }}
          path: +zarr/+internal/*.mex*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package per-platform archives and bundle MEX into the toolbox
        run: |
          cd artifacts
          for d in mex-*; do (cd "$d" && zip -r "../zarr-matlab-$d.zip" .); done
          cd ..
          cp artifacts/mex-*/* +zarr/+internal/
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true
      - name: Build .mltbx (all platform binaries included)
        uses: matlab-actions/run-command@v2
        with:
          command: cd(getenv('GITHUB_WORKSPACE')); addpath(fullfile(pwd, 'tools')); package_toolbox
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/zarr-matlab-mex-*.zip
            zarr-matlab-*.mltbx
